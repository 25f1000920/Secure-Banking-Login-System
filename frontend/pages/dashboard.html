<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Vault Dashboard | YaTanDeoSidSai Banking</title>
    <link rel="stylesheet" href="../css/styles.css">
</head>
<body style="overflow-y: auto;">
    <nav class="navbar" style="padding: 20px 50px;">
        <div class="logo">YaTanDeoSidSai</div>
        <button id="logoutBtn" class="btn-primary" style="width: auto; padding: 8px 20px;">Logout</button>
    </nav>

    <div class="dashboard-grid" style="padding: 50px;">
        <div class="glass-card" style="max-width: 800px; margin: auto;">
            <h2>Education Loan Application</h2>
            <p class="subtitle">Secure financing for your academic future.</p>
            
            <div id="securityAlert" class="security-banner"></div>

            <form id="loanForm" style="display: grid; grid-template-columns: 1fr 1fr; gap: 20px;">
                <div class="input-group">
                    <label>Applicant Full Name</label>
                    <input type="text" name="applicantName" required>
                </div>
                <div class="input-group">
                    <label>Loan Amount ($)</label>
                    <input type="number" name="loanAmount" required>
                </div>
                <div class="input-group" style="grid-column: span 2;">
                    <label>Purpose of Loan</label>
                    <input type="text" name="loanPurpose" placeholder="e.g. Master of Science in Communication Systems" required>
                </div>
                <div class="input-group">
                    <label>Institution Name</label>
                    <input type="text" name="institutionName" required>
                </div>
                <div class="input-group">
                    <label>Course Name</label>
                    <input type="text" name="courseName" required>
                </div>
                <div class="input-group">
                    <label>Course Duration</label>
                    <input type="text" name="courseDuration" required>
                </div>
                <div class="input-group">
                    <label>Current Annual Income</label>
                    <input type="number" name="annualIncome" required>
                </div>
                <div class="input-group" style="grid-column: span 2;">
                    <label>Upload Collateral/ID Document (PDF/PNG/JPG)</label>
                    <input type="file" name="collateral_file" accept=".pdf, .png, .jpg, .jpeg" required>
                </div>
                <button type="submit" class="btn-primary" style="grid-column: span 2;">Submit Application</button>
            </form>
        </div>
    </div>
    <script src="../js/security.js"></script>
    <script src="../js/dashboard.js"></script>
</body>
</html>
